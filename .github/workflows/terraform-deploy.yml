name: Terraform Deploy — Dev

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: "1.9.0"
  TF_IN_AUTOMATION: "true"

jobs:
  # ────────────────────────────────
  # JOB 1 — Plan
  # Runs when action = plan OR apply (apply needs the saved plan)
  # ────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-22.04
    if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra
        run: |
          terraform plan \
            -input=false \
            -var-file="terraform.tfvars" \
            -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: infra/tfplan
          retention-days: 7

  # ────────────────────────────────
  # JOB 2 — Apply
  # Runs only when action = apply, after plan completes
  # Requires manual approval via GitHub Environment protection rule
  # ────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-22.04
    needs: plan
    if: github.event.inputs.action == 'apply'
    environment: dev        # ← approval gate configured in Settings → Environments → dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # - name: Terraform Init
      #   working-directory: infra
      #   run: terraform init -input=false

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: infra

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -input=false -auto-approve tfplan

  # ────────────────────────────────
  # JOB 3 — Destroy
  # Runs only when action = destroy
  # Also requires manual approval via the same GitHub Environment gate
  # ────────────────────────────────
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-22.04
    if: github.event.inputs.action == 'destroy'
    environment: dev        # ← same approval gate protects destroy too

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # - name: Terraform Init
      #   working-directory: infra
      #   run: terraform init -input=false

      - name: Terraform Destroy
        working-directory: infra
        run: |
          terraform destroy \
            -input=false \
            -auto-approve \
            -var-file="terraform.tfvars"